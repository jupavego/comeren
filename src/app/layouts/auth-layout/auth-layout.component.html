<div class="auth-layout">

  <!-- ── Panel lateral de marca ───────────────────────────────────────────── -->
  <aside class="auth-sidebar">

    <!-- Burbujas decorativas de fondo -->
    <div class="auth-sidebar__deco" aria-hidden="true">
      <div class="auth-sidebar__bubble auth-sidebar__bubble--1"></div>
      <div class="auth-sidebar__bubble auth-sidebar__bubble--2"></div>
      <div class="auth-sidebar__bubble auth-sidebar__bubble--3"></div>
    </div>

    <!-- Logo + nombre -->
    <div class="auth-sidebar__top">
      <div class="auth-sidebar__logo-wrap">
        <svg class="auth-sidebar__logo-icon" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,.15)"/>
          <path d="M10 22c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
          <circle cx="18" cy="13" r="2.5" fill="#fff"/>
          <path d="M13 26h10" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/>
        </svg>
        <span class="auth-sidebar__name">Come en Girardota</span>
      </div>
      <p class="auth-sidebar__tagline">
        El directorio de sabores locales más completo de Girardota, Antioquia.
      </p>
    </div>

    <!-- Highlights centrales -->
    <div class="auth-sidebar__highlights">
      <div class="auth-sidebar__highlight">
        <div class="auth-sidebar__highlight-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
          </svg>
        </div>
        <div>
          <strong>100% local</strong>
          <span>Negocios de tu municipio</span>
        </div>
      </div>
      <div class="auth-sidebar__highlight">
        <div class="auth-sidebar__highlight-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </div>
        <div>
          <strong>Reseñas reales</strong>
          <span>Opiniones de la comunidad</span>
        </div>
      </div>
      <div class="auth-sidebar__highlight">
        <div class="auth-sidebar__highlight-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.64 3.18 2 2 0 0 1 3.62 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.6a16 16 0 0 0 6 6l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.68 16z"/>
          </svg>
        </div>
        <div>
          <strong>Pedidos por WhatsApp</strong>
          <span>Contacto directo con el negocio</span>
        </div>
      </div>
    </div>

    <!-- Footer con link de regreso -->
    <div class="auth-sidebar__footer">
      <a routerLink="/" class="auth-sidebar__back">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Volver al directorio
      </a>
    </div>

  </aside>

  <!-- ── Área de formulario ────────────────────────────────────────────────── -->
  <main class="auth-content">
    <router-outlet />
  </main>

</div>

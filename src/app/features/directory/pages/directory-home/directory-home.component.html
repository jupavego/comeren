@if (loading()) {
  <div class="directory-loading">
    <span class="spinner"></span>
  </div>
} @else {

  @if (state.showCarousel()) {
    <app-carousel
      [slides]="carouselSlides()"
      [autoplayMs]="9000"
    />
  }

  <section class="home-directory-showcase">
    <div class="home-directory-showcase__shell">
      <div class="home-directory-showcase__header">
        <app-section-header
          eyebrow="Directorio local"
          title="Negocios para descubrir en Girardota"
        />
      </div>

      <app-directory-list
        [accounts]="accounts()"
        [hasMore]="hasMore()"
        [loadingMore]="loadingMore()"
        (loadMoreClick)="onLoadMore()"
        (clearFilters)="onClearFilters()"
      />
    </div>
  </section>

  @if (mappedAccounts().length > 0) {
    <section class="home-map-showcase">
      <div class="home-map-showcase__shell">
        <div class="home-map-showcase__header">
          <app-section-header
            eyebrow="Dónde encontrarnos"
            title="Negocios de Girardota en el mapa"
          />
          <p class="home-map-showcase__hint">
            Pasa el cursor sobre un marcador para ver la información del negocio.
          </p>
        </div>
        @defer (on viewport; prefetch on idle) {
          <app-directory-map [accounts]="mappedAccounts()" />
        } @placeholder {
          <div class="home-map-placeholder"></div>
        }
      </div>
    </section>
  }

}
